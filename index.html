<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>就活トラッカー</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #222; }
    .container { max-width: 1280px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-bottom: 20px; }
    h1, h2, h3 { margin-top: 0; }
    .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 12px; }
    input, select, textarea, button { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #cfd6e4; border-radius: 10px; font-size: 14px; }
    textarea { min-height: 90px; resize: vertical; }
    button { background: #1f2937; color: white; border: none; cursor: pointer; }
    .sub-btn { background: #e5e7eb; color: #111827; }
    .danger-btn { background: #fee2e2; color: #991b1b; }
    .actions { display: flex; gap: 8px; }
    .hidden { display: none; }
    .toolbar { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; min-width: 1180px; }
    th, td { border-top: 1px solid #e5e7eb; padding: 10px; text-align: left; vertical-align: top; font-size: 14px; }
    th { background: #f3f4f6; border-top: none; }
    .table-wrap { overflow-x: auto; }
    .muted { color: #6b7280; font-size: 13px; }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; white-space: nowrap; }
    .industry-it { background: #dbeafe; color: #1d4ed8; }
    .industry-consulting { background: #ede9fe; color: #6d28d9; }
    .industry-maker { background: #fee2e2; color: #b91c1c; }
    .industry-trading { background: #ffedd5; color: #c2410c; }
    .industry-finance { background: #dcfce7; color: #15803d; }
    .industry-media { background: #fce7f3; color: #be185d; }
    .industry-hr { background: #ede9fe; color: #7c3aed; }
    .industry-realestate { background: #fef3c7; color: #b45309; }
    .industry-infra { background: #cffafe; color: #0f766e; }
    .industry-other { background: #e5e7eb; color: #374151; }
    .section-title { margin: 4px 0 8px; font-size: 13px; color: #475569; font-weight: bold; }
    .task-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid #e5e7eb; border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; }
    .task-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .task-text { word-break: break-word; }
    .task-empty { color: #6b7280; font-size: 14px; padding: 4px 0; }
    .date-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .date-box { border: 1px solid #e5e7eb; background: #f8fafc; border-radius: 12px; padding: 10px; }
    .date-label { font-size: 12px; color: #475569; font-weight: bold; margin-bottom: 6px; }
    .small-btn { width: auto; padding: 8px 10px; font-size: 12px; }
    .sort-btn { width: auto; white-space: nowrap; }
    @media (max-width: 900px) { .row, .toolbar, .date-group { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div id="authView" class="card">
      <h1>就活トラッカー</h1>
      <p class="muted">ユーザー名 + パスワードでログインします。データはこのブラウザ内だけに保存されます。</p>

      <div class="actions" style="margin-bottom:16px;">
        <button id="showLoginBtn" class="sub-btn" type="button">ログイン</button>
        <button id="showSignupBtn" type="button">新規登録</button>
      </div>

      <div id="authMessage" class="muted" style="margin-bottom:12px;"></div>

      <div class="row">
        <input id="username" type="text" placeholder="ユーザー名">
        <input id="signupUsername" type="text" placeholder="新規登録用ユーザー名">
      </div>
      <div class="row">
        <input id="password" type="password" placeholder="パスワード">
        <input id="confirmPassword" type="password" placeholder="確認用パスワード（新規登録時のみ）">
      </div>
      <button id="authSubmitBtn" type="button">新規登録</button>
    </div>

    <div id="appView" class="hidden">
      <div class="card">
        <div style="display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;">
          <div>
            <h2 style="margin-bottom:6px;">就活トラッカー</h2>
            <div id="currentUserText" class="muted"></div>
          </div>
          <div class="actions">
            <button id="logoutBtn" class="sub-btn" type="button">ログアウト</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>応募情報を追加 / 編集</h2>
        <div class="row">
          <input id="company" type="text" placeholder="会社名">
          <input id="position" type="text" placeholder="職種 / コース名">
        </div>
        <div class="row">
          <select id="industry">
            <option>IT・Web</option><option>コンサル</option><option>メーカー</option><option>商社</option>
            <option>金融</option><option>広告・マスコミ</option><option>人材</option><option>不動産</option>
            <option>インフラ</option><option>その他</option>
          </select>
          <select id="applicationType">
            <option>インターン</option><option>本選考</option><option>説明会</option>
            <option>カジュアル面談</option><option>OB・OG訪問</option>
          </select>
        </div>

        <div class="date-group">
          <div class="date-box">
            <div class="date-label">締め切り日時（提出・応募の期限）</div>
            <input id="deadline" type="datetime-local">
          </div>
          <div class="date-box">
            <div class="date-label">面接日時（選考イベントの予定日時）</div>
            <input id="interviewDate" type="datetime-local">
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <input id="esProgress" type="number" min="0" max="100" placeholder="ES進捗(%)">
          <select id="webTestType">
            <option>未設定</option><option>SPI</option><option>玉手箱</option><option>TG-WEB</option>
            <option>CAB</option><option>GAB</option><option>企業独自</option><option>なし</option>
          </select>
        </div>
        <div class="row">
          <select id="status">
            <option>未着手</option><option>情報収集中</option><option>ES作成中</option><option>ES提出済</option>
            <option>Webテスト待ち</option><option>面接予定</option><option>選考中</option><option>内定</option>
            <option>見送り</option><option>辞退</option>
          </select>
          <input id="nextAction" type="text" placeholder="次にやること">
        </div>
        <div class="row">
          <textarea id="notes" placeholder="メモ欄"></textarea>
        </div>
        <div class="actions">
          <button id="saveEntryBtn" type="button">保存</button>
          <button id="clearFormBtn" class="sub-btn" type="button">入力クリア</button>
        </div>
      </div>

      <div class="card">
        <h2>タスク管理</h2>
        <div class="row">
          <input id="taskInput" type="text" placeholder="やることを入力（例: SPI対策を30分）">
          <button id="addTaskBtn" type="button">タスク追加</button>
        </div>
        <div class="muted" style="margin-bottom:10px;">チェックすると完了扱いで一覧から消えます。</div>
        <div id="taskList"></div>
      </div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;">
          <h2 style="margin-bottom:0;">応募一覧</h2>
          <button id="sortDeadlineBtn" class="sort-btn sub-btn" type="button">締め切り日順: 昇順</button>
        </div>
        <div class="toolbar" style="margin-top:16px;">
          <input id="search" type="text" placeholder="会社名・職種・メモで検索">
          <select id="filterIndustry"><option value="">全業界</option><option>IT・Web</option><option>コンサル</option><option>メーカー</option><option>商社</option><option>金融</option><option>広告・マスコミ</option><option>人材</option><option>不動産</option><option>インフラ</option><option>その他</option></select>
          <select id="filterType"><option value="">全種別</option><option>インターン</option><option>本選考</option><option>説明会</option><option>カジュアル面談</option><option>OB・OG訪問</option></select>
          <select id="filterStatus"><option value="">全ステータス</option><option>未着手</option><option>情報収集中</option><option>ES作成中</option><option>ES提出済</option><option>Webテスト待ち</option><option>面接予定</option><option>選考中</option><option>内定</option><option>見送り</option><option>辞退</option></select>
          <input id="filterDeadline" type="date" title="締め切り日で絞り込み">
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>会社名</th><th>業界</th><th>職種 / コース名</th><th>応募種別</th><th>締め切り</th>
                <th>面接予定</th><th>ES進捗</th><th>Webテスト</th><th>ステータス</th><th>メモ欄</th><th>操作</th>
              </tr>
            </thead>
            <tbody id="entryTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const USERS_KEY = "job_hunt_users_v2";
    const SESSION_KEY = "job_hunt_session_v2";
    const ENTRY_KEY_PREFIX = "job_hunt_entries_v2_";
    const TASK_KEY_PREFIX = "job_hunt_tasks_v2_";
    let authMode = "signup";
    let editingId = null;
    let deadlineSort = "asc";

function exportData() {
  const data = {
    users: JSON.parse(localStorage.getItem("job_hunt_users_v2") || "[]"),
    entries: {},
    tasks: {}
  };

  data.users.forEach(u => {
    data.entries[u.username] = JSON.parse(localStorage.getItem("job_hunt_entries_v2_" + u.username) || "[]");
    data.tasks[u.username] = JSON.parse(localStorage.getItem("job_hunt_tasks_v2_" + u.username) || "[]");
  });

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "job-tracker-backup.json";
  a.click();
}

function importData() {
  const file = document.getElementById("importFile").files[0];
  if (!file) return alert("ファイルを選択してください");

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

      if (!confirm("現在のデータを上書きします。本当にいいですか？")) return;

      localStorage.setItem("job_hunt_users_v2", JSON.stringify(data.users || []));

      Object.keys(data.entries || {}).forEach(u => {
        localStorage.setItem("job_hunt_entries_v2_" + u, JSON.stringify(data.entries[u]));
      });

      Object.keys(data.tasks || {}).forEach(u => {
        localStorage.setItem("job_hunt_tasks_v2_" + u, JSON.stringify(data.tasks[u]));
      });

      alert("復元完了！ページをリロードしてください");
    } catch {
      alert("ファイルが壊れています");
    }
  };
  reader.readAsText(file);
}
    
    const authView = document.getElementById("authView");
    const appView = document.getElementById("appView");
    const authMessage = document.getElementById("authMessage");
    const authSubmitBtn = document.getElementById("authSubmitBtn");
    const showLoginBtn = document.getElementById("showLoginBtn");
    const showSignupBtn = document.getElementById("showSignupBtn");
    const currentUserText = document.getElementById("currentUserText");
    const logoutBtn = document.getElementById("logoutBtn");
<button onclick="exportData()">📥 バックアップ</button>
<input type="file" id="importFile" />
<button onclick="importData()">📤 復元</button>
    const username = document.getElementById("username");
    const signupUsername = document.getElementById("signupUsername");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");

    const company = document.getElementById("company");
    const position = document.getElementById("position");
    const industry = document.getElementById("industry");
    const applicationType = document.getElementById("applicationType");
    const deadline = document.getElementById("deadline");
    const interviewDate = document.getElementById("interviewDate");
    const esProgress = document.getElementById("esProgress");
    const webTestType = document.getElementById("webTestType");
    const status = document.getElementById("status");
    const nextAction = document.getElementById("nextAction");
    const notes = document.getElementById("notes");
    const saveEntryBtn = document.getElementById("saveEntryBtn");
    const clearFormBtn = document.getElementById("clearFormBtn");

    const taskInput = document.getElementById("taskInput");
    const addTaskBtn = document.getElementById("addTaskBtn");
    const taskList = document.getElementById("taskList");

    const search = document.getElementById("search");
    const filterIndustry = document.getElementById("filterIndustry");
    const filterType = document.getElementById("filterType");
    const filterStatus = document.getElementById("filterStatus");
    const filterDeadline = document.getElementById("filterDeadline");
    const entryTableBody = document.getElementById("entryTableBody");
    const sortDeadlineBtn = document.getElementById("sortDeadlineBtn");

    function getUsers() { return JSON.parse(localStorage.getItem(USERS_KEY) || "[]"); }
    function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
    function getSession() { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); }
    function saveSession(session) { localStorage.setItem(SESSION_KEY, JSON.stringify(session)); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }
    function getEntryKey(uid) { return ENTRY_KEY_PREFIX + uid; }
    function getTaskKey(uid) { return TASK_KEY_PREFIX + uid; }
    function getEntries(uid) { return JSON.parse(localStorage.getItem(getEntryKey(uid)) || "[]"); }
    function saveEntries(uid, entries) { localStorage.setItem(getEntryKey(uid), JSON.stringify(entries)); }
    function getTasks(uid) { return JSON.parse(localStorage.getItem(getTaskKey(uid)) || "[]"); }
    function saveTasks(uid, tasks) { localStorage.setItem(getTaskKey(uid), JSON.stringify(tasks)); }

    function formatDateTime(value) {
      if (!value) return "-";
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${yyyy}/${mm}/${dd} ${hh}:${mi}`;
    }

    function getDateOnly(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return "";
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function getCurrentUser() { return getSession(); }

    function switchAuthMode(mode) {
      authMode = mode;
      authMessage.textContent = "";
      authSubmitBtn.textContent = mode === "signup" ? "新規登録" : "ログイン";
      signupUsername.style.display = mode === "signup" ? "block" : "none";
      confirmPassword.style.display = mode === "signup" ? "block" : "none";
      showLoginBtn.className = mode === "login" ? "" : "sub-btn";
      showSignupBtn.className = mode === "signup" ? "" : "sub-btn";
    }

    function renderApp() {
      const currentUser = getCurrentUser();
      if (!currentUser) {
        authView.classList.remove("hidden");
        appView.classList.add("hidden");
        return;
      }
      authView.classList.add("hidden");
      appView.classList.remove("hidden");
      currentUserText.textContent = `ログイン中: ${currentUser.username}`;
      renderEntries();
      renderTasks();
    }

    function industryClass(name) {
      const map = {
        "IT・Web": "industry-it",
        "コンサル": "industry-consulting",
        "メーカー": "industry-maker",
        "商社": "industry-trading",
        "金融": "industry-finance",
        "広告・マスコミ": "industry-media",
        "人材": "industry-hr",
        "不動産": "industry-realestate",
        "インフラ": "industry-infra",
        "その他": "industry-other"
      };
      return map[name] || "industry-other";
    }

    function getFilteredEntries() {
      const currentUser = getCurrentUser();
      if (!currentUser) return [];
      let entries = getEntries(currentUser.username);
      const q = search.value.trim().toLowerCase();
      const fi = filterIndustry.value;
      const ft = filterType.value;
      const fs = filterStatus.value;
      const fd = filterDeadline.value;

      let result = entries.filter(e => {
        const text = [e.company, e.position, e.notes, e.industry, e.nextAction].join(" ").toLowerCase();
        return (!q || text.includes(q))
          && (!fi || e.industry === fi)
          && (!ft || e.applicationType === ft)
          && (!fs || e.status === fs)
          && (!fd || getDateOnly(e.deadline) === fd);
      });

      result.sort((a, b) => {
        const da = a.deadline ? new Date(a.deadline).getTime() : Number.MAX_SAFE_INTEGER;
        const db = b.deadline ? new Date(b.deadline).getTime() : Number.MAX_SAFE_INTEGER;
        return deadlineSort === "asc" ? da - db : db - da;
      });

      return result;
    }

    function renderEntries() {
      const entries = getFilteredEntries();
      entryTableBody.innerHTML = "";
      sortDeadlineBtn.textContent = `締め切り日順: ${deadlineSort === "asc" ? "昇順" : "降順"}`;

      if (entries.length === 0) {
        entryTableBody.innerHTML = '<tr><td colspan="11" class="muted" style="padding:24px;">データがありません。</td></tr>';
        return;
      }

      entries.forEach(e => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(e.company || "")}<div class="muted">${escapeHtml(e.nextAction || "")}</div></td>
          <td><span class="pill ${industryClass(e.industry)}">${escapeHtml(e.industry || "")}</span></td>
          <td>${escapeHtml(e.position || "-")}</td>
          <td>${escapeHtml(e.applicationType || "")}</td>
          <td><div class="section-title">提出・応募の期限</div>${escapeHtml(formatDateTime(e.deadline))}</td>
          <td><div class="section-title">面接・イベント日時</div>${escapeHtml(formatDateTime(e.interviewDate))}</td>
          <td>${escapeHtml(String(e.esProgress ?? 0))}%</td>
          <td>${escapeHtml(e.webTestType || "")}</td>
          <td>${escapeHtml(e.status || "")}</td>
          <td>${escapeHtml(e.notes || "-")}</td>
          <td>
            <div class="actions">
              <button class="small-btn" type="button" onclick="editEntry('${e.id}')">編集</button>
              <button class="small-btn danger-btn" type="button" onclick="deleteEntry('${e.id}')">削除</button>
            </div>
          </td>
        `;
        entryTableBody.appendChild(tr);
      });
    }

    function clearEntryForm() {
      editingId = null;
      company.value = "";
      position.value = "";
      industry.value = "IT・Web";
      applicationType.value = "インターン";
      deadline.value = "";
      interviewDate.value = "";
      esProgress.value = "";
      webTestType.value = "未設定";
      status.value = "未着手";
      nextAction.value = "";
      notes.value = "";
    }

    function renderTasks() {
      const currentUser = getCurrentUser();
      if (!currentUser) return;
      const tasks = getTasks(currentUser.username);
      taskList.innerHTML = "";
      if (tasks.length === 0) {
        taskList.innerHTML = '<div class="task-empty">タスクはまだありません。</div>';
        return;
      }
      tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task-item";
        div.innerHTML = `
          <div class="task-left">
            <input type="checkbox" onchange="completeTask('${task.id}')" />
            <div class="task-text">${escapeHtml(task.text)}</div>
          </div>
          <div class="muted">${escapeHtml(task.createdAt)}</div>
        `;
        taskList.appendChild(div);
      });
    }

    function addTask() {
      const currentUser = getCurrentUser();
      if (!currentUser) return;
      const text = taskInput.value.trim();
      if (!text) return;
      const tasks = getTasks(currentUser.username);
      const now = new Date();
      const label = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,"0")}/${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
      tasks.unshift({ id: String(Date.now()), text, createdAt: label });
      saveTasks(currentUser.username, tasks);
      taskInput.value = "";
      renderTasks();
    }

    function completeTask(id) {
      const currentUser = getCurrentUser();
      if (!currentUser) return;
      const tasks = getTasks(currentUser.username).filter(t => t.id !== id);
      saveTasks(currentUser.username, tasks);
      renderTasks();
    }

    function editEntry(id) {
      const currentUser = getCurrentUser();
      const entries = getEntries(currentUser.username);
      const e = entries.find(x => x.id === id);
      if (!e) return;
      editingId = id;
      company.value = e.company || "";
      position.value = e.position || "";
      industry.value = e.industry || "IT・Web";
      applicationType.value = e.applicationType || "インターン";
      deadline.value = e.deadline || "";
      interviewDate.value = e.interviewDate || "";
      esProgress.value = e.esProgress ?? "";
      webTestType.value = e.webTestType || "未設定";
      status.value = e.status || "未着手";
      nextAction.value = e.nextAction || "";
      notes.value = e.notes || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteEntry(id) {
      const currentUser = getCurrentUser();
      const entries = getEntries(currentUser.username).filter(x => x.id !== id);
      saveEntries(currentUser.username, entries);
      renderEntries();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    showLoginBtn.onclick = () => switchAuthMode("login");
    showSignupBtn.onclick = () => switchAuthMode("signup");

    authSubmitBtn.onclick = () => {
      const users = getUsers();
      if (authMode === "signup") {
        if (!signupUsername.value || !password.value || !confirmPassword.value) {
          authMessage.textContent = "新規登録用ユーザー名とパスワードを入力してください。";
          return;
        }
        if (password.value !== confirmPassword.value) {
          authMessage.textContent = "確認用パスワードが一致しません。";
          return;
        }
        if (users.some(u => u.username === signupUsername.value)) {
          authMessage.textContent = "そのユーザー名はすでに使われています。";
          return;
        }
        const user = { username: signupUsername.value, password: password.value };
        users.push(user);
        saveUsers(users);
        saveSession({ username: user.username });
        username.value = "";
        signupUsername.value = "";
        password.value = "";
        confirmPassword.value = "";
        renderApp();
      } else {
        if (!username.value || !password.value) {
          authMessage.textContent = "ユーザー名とパスワードを入力してください。";
          return;
        }
        const user = users.find(u => u.username === username.value && u.password === password.value);
        if (!user) {
          authMessage.textContent = "ユーザー名またはパスワードが違います。";
          return;
        }
        saveSession({ username: user.username });
        username.value = "";
        signupUsername.value = "";
        password.value = "";
        confirmPassword.value = "";
        renderApp();
      }
    };

    logoutBtn.onclick = () => { clearSession(); renderApp(); };

    saveEntryBtn.onclick = () => {
      const currentUser = getCurrentUser();
      if (!currentUser) return;
      if (!company.value.trim()) {
        alert("会社名を入力してください。");
        return;
      }
      const entries = getEntries(currentUser.username);
      const entry = {
        id: editingId || String(Date.now()),
        company: company.value,
        position: position.value,
        industry: industry.value,
        applicationType: applicationType.value,
        deadline: deadline.value,
        interviewDate: interviewDate.value,
        esProgress: Number(esProgress.value || 0),
        webTestType: webTestType.value,
        status: status.value,
        nextAction: nextAction.value,
        notes: notes.value
      };
      const newEntries = editingId ? entries.map(x => x.id === editingId ? entry : x) : [entry, ...entries];
      saveEntries(currentUser.username, newEntries);
      clearEntryForm();
      renderEntries();
    };

    clearFormBtn.onclick = clearEntryForm;
    addTaskBtn.onclick = addTask;
    taskInput.addEventListener("keydown", function(e) { if (e.key === "Enter") addTask(); });
    search.oninput = renderEntries;
    filterIndustry.onchange = renderEntries;
    filterType.onchange = renderEntries;
    filterStatus.onchange = renderEntries;
    filterDeadline.onchange = renderEntries;
    sortDeadlineBtn.onclick = () => { deadlineSort = deadlineSort === "asc" ? "desc" : "asc"; renderEntries(); };

    switchAuthMode("signup");
    renderApp();
    window.editEntry = editEntry;
    window.deleteEntry = deleteEntry;
    window.completeTask = completeTask;
  </script>
</body>
</html>
